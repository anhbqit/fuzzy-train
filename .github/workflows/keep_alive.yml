name: Ping Render Server

on:
  schedule:
    # Runs every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        # Replace the URL below with your actual Render web address once you have it
        run: curl -s https://your-render-app-name.onrender.com > /dev/null
